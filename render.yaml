services:
  - type: web
    name: chaski-chatapp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && daphne -b 0.0.0.0 -p $PORT config.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "true"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: chaski-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: chaski-redis
          property: connectionString

  - type: redis
    name: chaski-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

# PostgreSQL managed database
# If your Render plan does not allow free Postgres in your region, create it manually
# and set DATABASE_URL in the web service env vars.
databases:
  - name: chaski-db
    plan: free
